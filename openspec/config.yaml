schema: spec-driven

context: |
  Tech stack: React 19 + Vite SPA frontend; Node.js + Express 5 + Sequelize backend on PostgreSQL.
  Architecture: Modular monolith with business modules split into application, infrastructure, and presentation layers.
  Testing: Backend uses Node's built-in test runner (`npm test` in `backend/`); frontend relies on ESLint and manual UI validation.
  Style: JavaScript/JSX ESM code, frontend ESLint enforcement, concise Markdown docs primarily written in Spanish.
  Operations: Local Postgres or Docker Compose, Render deployment config, runtime env driven by backend `DB_*` variables.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    guidance:
      - Follow existing code patterns and conventions
    tdd: false
    test_command: "cd backend && npm test"
  verify:
    test_command: "cd backend && npm test"
    build_command: "cd frontend && npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)
